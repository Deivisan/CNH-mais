<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1E3A5F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>CNH+ | Aulas de Direção</title>
  
  <link rel="manifest" href="app.webmanifest">
  <link rel="icon" type="image/png" href="assets/icons/icon-192x192.png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  
  <!-- ============================================ -->
  <!-- SELETOR DE PERFIL (Tela Inicial) -->
  <!-- ============================================ -->
  <div id="profile-selector" class="screen active">
    <div class="profile-selector-container">
      <div class="logo-container">
        <div class="app-logo">CNH+</div>
        <p class="tagline">Sua CNH mais fácil</p>
      </div>
      
      <h1>Entrar como</h1>
      
      <div class="profile-cards">
        <button class="profile-card" onclick="app.login('candidato')">
          <span class="material-symbols-rounded">school</span>
          <h2>Candidato</h2>
          <p>Aprender a dirigir</p>
        </button>
        
        <button class="profile-card" onclick="app.login('instrutor')">
          <span class="material-symbols-rounded">drive_eta</span>
          <h2>Instrutor</h2>
          <p>Dar aulas</p>
        </button>
        
        <button class="profile-card" onclick="app.login('admin')">
          <span class="material-symbols-rounded">admin_panel_settings</span>
          <h2>Administrador</h2>
          <p>Gerenciar plataforma</p>
        </button>
      </div>
      
      <p class="demo-notice">Demo navegável - Dados simulados</p>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- APP CANDIDATO -->
  <!-- ============================================ -->
  <div id="app-candidato" class="screen">
    
    <!-- AppBar -->
    <header class="app-bar">
      <button class="icon-btn" onclick="app.logout()">
        <span class="material-symbols-rounded">arrow_back</span>
      </button>
      <h1 id="candidato-title">CNH+</h1>
      <button class="icon-btn" onclick="app.showNotifications()">
        <span class="material-symbols-rounded">notifications</span>
      </button>
    </header>

    <!-- Conteúdo -->
    <main class="content" id="candidato-content">
      <!-- Conteúdo dinâmico injetado via JS -->
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-screen="home" onclick="candidato.navigate('home')">
        <span class="material-symbols-rounded">home</span>
        <span>Início</span>
      </button>
      <button class="nav-item" data-screen="aulas" onclick="candidato.navigate('aulas')">
        <span class="material-symbols-rounded">event</span>
        <span>Aulas</span>
      </button>
      <button class="nav-item" data-screen="instrutor" onclick="candidato.navigate('instrutor')">
        <span class="material-symbols-rounded">person</span>
        <span>Instrutor</span>
      </button>
      <button class="nav-item" data-screen="perfil" onclick="candidato.navigate('perfil')">
        <span class="material-symbols-rounded">account_circle</span>
        <span>Perfil</span>
      </button>
    </nav>

  </div>

  <!-- ============================================ -->
  <!-- APP INSTRUTOR -->
  <!-- ============================================ -->
  <div id="app-instrutor" class="screen">
    
    <!-- AppBar -->
    <header class="app-bar">
      <button class="icon-btn" id="instrutor-drawer-toggle">
        <span class="material-symbols-rounded">menu</span>
      </button>
      <h1 id="instrutor-title">Dashboard</h1>
      <button class="icon-btn" onclick="app.showNotifications()">
        <span class="material-symbols-rounded">notifications</span>
      </button>
    </header>

    <!-- Drawer Lateral -->
    <aside id="instrutor-drawer" class="drawer">
      <div class="drawer-header">
        <img src="assets/img/instrutor-maria.jpg" alt="Maria Santos" class="drawer-avatar">
        <h3>Maria Santos</h3>
        <p>Verificada ✓</p>
      </div>
      <nav class="drawer-nav">
        <button class="drawer-item active" data-screen="dashboard" onclick="instrutor.navigate('dashboard')">
          <span class="material-symbols-rounded">dashboard</span>
          <span>Dashboard</span>
        </button>
        <button class="drawer-item" data-screen="perfil" onclick="instrutor.navigate('perfil')">
          <span class="material-symbols-rounded">person</span>
          <span>Meu Perfil</span>
        </button>
        <button class="drawer-item" data-screen="agenda" onclick="instrutor.navigate('agenda')">
          <span class="material-symbols-rounded">calendar_month</span>
          <span>Agenda</span>
        </button>
        <button class="drawer-item" data-screen="midia" onclick="instrutor.navigate('midia')">
          <span class="material-symbols-rounded">video_library</span>
          <span>Mídia</span>
        </button>
        <button class="drawer-item" data-screen="resultados" onclick="instrutor.navigate('resultados')">
          <span class="material-symbols-rounded">bar_chart</span>
          <span>Resultados</span>
        </button>
        <button class="drawer-item" data-screen="financeiro" onclick="instrutor.navigate('financeiro')">
          <span class="material-symbols-rounded">payments</span>
          <span>Financeiro</span>
        </button>
        <button class="drawer-item" data-screen="bancarios" onclick="instrutor.navigate('bancarios')">
          <span class="material-symbols-rounded">account_balance</span>
          <span>Dados Bancários</span>
        </button>
        <button class="drawer-item" data-screen="aulas" onclick="instrutor.navigate('aulas')">
          <span class="material-symbols-rounded">school</span>
          <span>Aulas & Disputas</span>
        </button>
        <button class="drawer-item" data-screen="veiculo" onclick="instrutor.navigate('veiculo')">
          <span class="material-symbols-rounded">directions_car</span>
          <span>Veículo</span>
        </button>
        <button class="drawer-item" data-screen="comunidade" onclick="instrutor.navigate('comunidade')">
          <span class="material-symbols-rounded">groups</span>
          <span>Comunidade</span>
        </button>
        <button class="drawer-item" data-screen="suporte" onclick="instrutor.navigate('suporte')">
          <span class="material-symbols-rounded">support_agent</span>
          <span>Suporte</span>
        </button>
        <div class="drawer-divider"></div>
        <button class="drawer-item" onclick="app.logout()">
          <span class="material-symbols-rounded">logout</span>
          <span>Sair</span>
        </button>
      </nav>
    </aside>

    <!-- Conteúdo -->
    <main class="content with-drawer" id="instrutor-content">
      <!-- Conteúdo dinâmico injetado via JS -->
    </main>

  </div>

  <!-- ============================================ -->
  <!-- APP ADMIN -->
  <!-- ============================================ -->
  <div id="app-admin" class="screen">
    
    <!-- AppBar -->
    <header class="app-bar">
      <button class="icon-btn" onclick="app.logout()">
        <span class="material-symbols-rounded">arrow_back</span>
      </button>
      <h1 id="admin-title">Painel Administrativo</h1>
      <button class="icon-btn" onclick="app.showNotifications()">
        <span class="material-symbols-rounded">notifications</span>
      </button>
    </header>

    <!-- Tabs Superiores -->
    <nav class="tabs-nav" id="admin-tabs">
      <button class="tab active" data-tab="overview" onclick="admin.navigate('overview')">Visão Geral</button>
      <button class="tab" data-tab="instrutores" onclick="admin.navigate('instrutores')">Instrutores</button>
      <button class="tab" data-tab="candidatos" onclick="admin.navigate('candidatos')">Candidatos</button>
      <button class="tab" data-tab="financeiro" onclick="admin.navigate('financeiro')">Financeiro</button>
      <button class="tab" data-tab="disputas" onclick="admin.navigate('disputas')">Disputas</button>
    </nav>

    <!-- Conteúdo -->
    <main class="content with-tabs" id="admin-content">
      <!-- Conteúdo dinâmico injetado via JS -->
    </main>

  </div>

  <!-- Drawer Overlay -->
  <div id="drawer-overlay" class="drawer-overlay"></div>

  <!-- Scripts -->
  <script src="assets/js/data.js"></script>
  <script src="assets/js/candidato.js"></script>
  <script src="assets/js/instrutor.js"></script>
  <script src="assets/js/admin.js"></script>
  <script src="assets/js/app.js"></script>
  
  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('✅ Service Worker registrado'))
        .catch(err => console.error('❌ Erro ao registrar SW:', err));
    }
  </script>

</body>
</html>
